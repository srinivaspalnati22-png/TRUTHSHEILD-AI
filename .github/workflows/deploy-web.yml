name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --no-tree-shake-icons \
            --dart-define=GEMINI_API_KEY=AIzaSyCfhZgzhfXEhOv8pWOnmvp_IRS_xtfgZXk

      - name: Deploy to Firebase Hosting
        # Only deploy if the service account secret is configured
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: trustshieldai-8f2fd

      - name: Skip deploy (no service account configured)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT == '' }}
        run: |
          echo "⚠️ Skipping Firebase Hosting deploy."
          echo "To enable, add FIREBASE_SERVICE_ACCOUNT to GitHub Secrets."
          echo "✅ Web build was successful - artifacts available."

      - name: Upload web build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 7
