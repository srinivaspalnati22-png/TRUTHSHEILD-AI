pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader("UTF-8") { properties.load(it) }
        }
        def sdkPath = properties["flutter.sdk"] ?: System.env.FLUTTER_ROOT
        if (sdkPath == null) {
            throw new Exception("Flutter SDK not found. Define flutter.sdk in local.properties or set FLUTTER_ROOT env variable.")
        }
        sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    id "com.google.gms.google-services" version "4.4.1" apply false
}

include ":app"
