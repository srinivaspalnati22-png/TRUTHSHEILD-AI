name: trustshield_ai
description: TrustShield AI - AI-Powered Digital Trust & Scam Protection Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  cloud_functions: ^5.6.2
  firebase_analytics: ^11.2.1
  firebase_messaging: ^15.0.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2
  percent_indicator: ^4.2.3

  # Networking & AI
  http: ^1.2.1
  dio: ^5.4.3+1
  google_generative_ai: ^0.4.6

  # Storage & Security
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # File & Document
  file_picker: ^8.0.7
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  open_file: ^3.3.2

  # ML Kit OCR
  google_mlkit_text_recognition: ^0.13.0

  # Navigation
  go_router: ^14.2.7

  # URL & Web
  url_launcher: ^6.3.0
  webview_flutter: ^4.7.0

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  logger: ^2.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
